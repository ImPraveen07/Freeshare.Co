<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auragram | Snap Fix</title>
    <script async src="https://www.snapchat.com/js/embed.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background:#000; color:#fff; overflow:hidden; }

        .top-nav {
            position: fixed; top:0; width:100%; padding:15px;
            background:rgba(0,0,0,0.8); z-index:100; display:flex; gap:10px;
        }
        input { flex:1; padding:10px; border-radius:8px; border:none; background:#222; color:#fff; }
        button { padding:10px 20px; border-radius:8px; border:none; background:#FFFC00; color:#000; font-weight:bold; }

        #feed { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
        .reel { 
            height:100vh; width:100%; scroll-snap-align:start; 
            display:flex; align-items:center; justify-content:center; position:relative;
        }

        /* The Fix: Ensuring the container has height */
        .snap-box { width:100%; height:90vh; display:flex; justify-content:center; }
        
        iframe, video { width:100%; height:100%; border:none; }
        
        .loading-text { position:absolute; z-index:-1; color:#444; }
    </style>
</head>
<body>

    <div class="top-nav">
        <input type="text" id="link" placeholder="Paste Snap Spotlight Link...">
        <button onclick="addSnap()">ADD</button>
    </div>

    <div id="feed"></div>

    <script>
        function addSnap() {
            let url = document.getElementById('link').value.trim();
            if(!url) return;

            // Clean the URL (removes tracking junk)
            if(url.includes('?')) url = url.split('?')[0];

            const feed = document.getElementById('feed');
            const div = document.createElement('div');
            div.className = 'reel';

            // We use a clean Embed format
            div.innerHTML = `
                <div class="loading-text">Loading Video...</div>
                <div class="snap-box">
                    <blockquote class="snapchat-embed" 
                        data-snapchat-embed-url="${url}" 
                        data-snapchat-embed-width="100%" 
                        data-snapchat-embed-height="100%">
                    </blockquote>
                </div>
            `;

            feed.prepend(div);
            document.getElementById('link').value = "";
            div.scrollIntoView({behavior:'smooth'});

            // 1. Tell Snapchat to render
            if(window.snapchat) window.snapchat.embed();

            // 2. THE ULTIMATE FALLBACK
            // If it's still black/empty after 3 seconds, we force an iframe
            setTimeout(() => {
                const box = div.querySelector('.snap-box');
                // Check if the SDK actually put an iframe inside
                if (box.innerHTML.includes('blockquote') && !box.querySelector('iframe')) {
                    console.log("SDK Failed. Switching to Iframe Fallback...");
                    box.innerHTML = `<iframe src="${url.replace('snapchat.com', 'snapchat.com/embed')}" allow="autoplay"></iframe>`;
                }
            }, 3000);
        }
    </script>
</body>
</html>
